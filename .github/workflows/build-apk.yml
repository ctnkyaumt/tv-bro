name: Build Android APK
on:
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      versionName:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build APK
        run: |
          ./gradlew assemble${{ inputs.buildType }} \
            -Pandroid.injected.buildOnlyTargetAbi=arm64-v8a,armeabi-v7a
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.buildType }}-apk
          path: |
            app/build/outputs/apk/${{ inputs.buildType }}/app-${{ inputs.buildType }}-arm64-v8a.apk
            app/build/outputs/apk/${{ inputs.buildType }}/app-${{ inputs.buildType }}-armeabi-v7a.apk
